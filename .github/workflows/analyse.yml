name: Analyse boursière quotidienne

on:
  schedule:
    # Crons en UTC (pas de gestion DST). GitHub RETARDE ou ABANDONNE souvent les
    # crons « pile à l'heure » (:00) : on décale aux minutes creuses (:07/:37) et
    # on multiplie les tentatives sur la soirée. Le garde-fou --garde-cloture
    # (fenêtre 17h–21h Paris) + l'anti-doublon garantissent UN SEUL achat réel,
    # quel que soit le cron qui finit par passer.
    - cron: "7 15 * * 1-5"    # été 17:07 Paris            — fenêtre principale (CEST)
    - cron: "7 16 * * 1-5"    # été 18:07 / hiver 17:07    — principal hiver, secours été
    - cron: "37 16 * * 1-5"   # été 18:37 / hiver 17:37    — secours
    - cron: "7 18 * * 1-5"    # été 20:07 / hiver 19:07    — filet de sécurité tardif
  workflow_dispatch:          # bouton « Run workflow » pour tester à la main

permissions:
  contents: write             # nécessaire pour sauvegarder le portefeuille

concurrency:
  group: analyse-quotidienne
  cancel-in-progress: false

jobs:
  analyse:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer l'analyse
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUTF8: "1"
          TZ: Europe/Paris
        # Déclenchement manuel = run complet (test) ; cron = avec garde-fou horaire.
        run: python main.py ${{ github.event_name == 'schedule' && '--garde-cloture' || '' }}

      - name: Sauvegarder le portefeuille et les rapports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/portefeuille.json reports/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Aucune modification à sauvegarder."
          else
            git commit -m "Analyse du $(date +%F)"
            git push
          fi
