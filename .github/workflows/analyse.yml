name: Analyse boursière quotidienne

on:
  # Déclenchement piloté par cron-job.org (externe, ponctuel) qui appelle l'API
  # workflow_dispatch chaque jour ouvré à 17h05 Paris. Le cron interne de GitHub
  # a été retiré : il se déclenchait avec des heures de retard (plus nuisance que
  # secours) et, après une remise à zéro, pouvait racheter pour une journée déjà
  # clôturée. cron-job.org est le déclencheur fiable (voir docs/declenchement-externe.md).
  workflow_dispatch:          # appelé par cron-job.org (et bouton « Run workflow » manuel)

permissions:
  contents: write             # nécessaire pour sauvegarder le portefeuille

concurrency:
  group: analyse-quotidienne
  cancel-in-progress: false

jobs:
  analyse:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer l'analyse
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUTF8: "1"
          TZ: Europe/Paris
        # Déclenché par cron-job.org à 17h05 Paris : run complet (pas de garde-fou
        # horaire, qui ne servait qu'aux crons internes désormais retirés).
        run: python main.py

      - name: Sauvegarder le portefeuille et les rapports
        # always() : on sauvegarde même si l'analyse a échoué (ex. API surchargée
        # après l'évaluation) pour ne pas perdre une évaluation déjà calculée.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/portefeuille.json data/benchmark.json reports/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Aucune modification à sauvegarder."
          else
            git commit -m "Analyse du $(date +%F)"
            git push
          fi
